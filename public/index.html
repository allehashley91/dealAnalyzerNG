  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = Recharts;

    // ── Helpers ──────────────────────────────────────────────────────────────
    const fmt   = (n,d=0) => isNaN(n)||!isFinite(n)?"-":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
    const fmtPct= (n,d=1) => isNaN(n)||!isFinite(n)?"-":n.toFixed(d)+"%";
    const fmtD  = (n,d=0) => isNaN(n)||!isFinite(n)?"-":"$"+fmt(n,d);
    const clamp = n => (isNaN(n)||!isFinite(n))?0:n;

    const TABS = ["📋 Smart Analysis","⚙️ Inputs","📊 Analysis","💬 Advisor","📁 History"];

    const DEF = {
      address:"",date:new Date().toISOString().slice(0,10),propType:"Single family rehab",
      arv:0,asisValue:0,wholesaleValue:0,rehabCost:0,purchasePrice:0,
      sqft:0,units:1,holdMonths:6,occupied:false,taxBracket:0,
      firstMortgagePct:80,firstMortgageRate:11,secondMortgagePct:0,secondMortgageRate:0,
      internalCapitalRate:0,originationCost:0,propertyTaxes:1200,prepaymentPenalties:0,
      sellingRecordingFees:200,realtorPct:3,transferTaxPct:0.12,homeWarranty:500,
      staging:1500,marketing:500,utilityMonthly:200,
      beds:"",baths:"",garage:"",yearBuilt:"",neighborhood:"",state:"",zip:"",
      rehabNotes:"",arvNotes:"",riskNotes:"",verdict:"",counterOffer:"",comps:[],
    };

    // ── Calculations ─────────────────────────────────────────────────────────
    function calc(d) {
      const pp=d.purchasePrice, arv=d.arv, sqft=d.sqft||1;
      const escrowSell=(arv*4)/1000, realtorFee=arv*(d.realtorPct/100);
      const transferTax=arv*(d.transferTaxPct/100);
      const totalSellCosts=escrowSell+realtorFee+transferTax+d.homeWarranty+d.staging+d.marketing+d.sellingRecordingFees;
      const netSalesPrice=arv-totalSellCosts;
      const escrowBuy=(pp*4)/1000, titleIns=500+pp*0.0025;
      const recFeesBuy=d.originationCost>0?200:100, titleSearch=225;
      const totalPurchaseCosts=escrowBuy+d.originationCost+titleIns+recFeesBuy+titleSearch;
      const firstMtg=pp*(d.firstMortgagePct/100), secondMtg=pp*(d.secondMortgagePct/100);
      const downPayment=pp-firstMtg-secondMtg;
      const insRate=d.occupied?(0.77/1000):(6/1000);
      const insuranceHold=(pp*insRate+500)*(d.holdMonths/12);
      const utilities=d.utilityMonthly*d.holdMonths;
      const firstMtgInt=firstMtg*(d.firstMortgageRate/100)*(d.holdMonths/12);
      const secondMtgInt=secondMtg*(d.secondMortgageRate/100)*(d.holdMonths/12);
      const rehabHold=(d.rehabCost/2)*(d.internalCapitalRate/100)*(d.holdMonths/12);
      const financingCosts=firstMtgInt+secondMtgInt+rehabHold;
      const totalHolding=insuranceHold+d.propertyTaxes+utilities+financingCosts+d.prepaymentPenalties;
      const netProfit=netSalesPrice-pp-totalPurchaseCosts-d.rehabCost-totalHolding;
      const profitPct=(netProfit/arv)*100;
      const profitPerSqft=netProfit/sqft, pricePerSqft=pp/sqft, arvPerSqft=arv/sqft;
      const totalCommitted=downPayment+(d.rehabCost/2);
      const annualizedCOC=totalCommitted>0?((netProfit/totalCommitted)/(d.holdMonths/12))*100:0;
      const meetsProfit=netProfit>=40000, meetsRoi=profitPct>=7.5&&profitPct<=10, meetsSqft=profitPerSqft>=25;
      const verdict=(meetsProfit&&meetsRoi)?"DEAL":(netProfit>=40000||profitPct>=7.5)?"REVIEW":"PASS";
      const maxPP_40k=arv-totalSellCosts-d.rehabCost-totalHolding-totalPurchaseCosts-40000;
      const maxPP_75=arv*(1-0.075)-totalSellCosts-d.rehabCost-totalHolding-totalPurchaseCosts;
      return {
        escrowSell,realtorFee,transferTax,totalSellCosts,netSalesPrice,
        escrowBuy,titleIns,recFeesBuy,titleSearch,totalPurchaseCosts,
        firstMtg,secondMtg,downPayment,insuranceHold,utilities,financingCosts,totalHolding,
        netProfit,profitPct,profitPerSqft,pricePerSqft,arvPerSqft,
        totalCommitted,annualizedCOC,meetsProfit,meetsRoi,meetsSqft,verdict,maxPP_40k,maxPP_75,
        breakdown:[
          {name:"Purchase",value:clamp(pp),fill:"#6366f1"},
          {name:"Buy Costs",value:clamp(totalPurchaseCosts),fill:"#8b5cf6"},
          {name:"Rehab",value:clamp(d.rehabCost),fill:"#f59e0b"},
          {name:"Holding",value:clamp(totalHolding),fill:"#f97316"},
          {name:"Sell Costs",value:clamp(totalSellCosts),fill:"#ef4444"},
          {name:"Net Profit",value:clamp(netProfit),fill:netProfit>=0?"#22c55e":"#dc2626"},
        ]
      };
    }

    // ── Small components ──────────────────────────────────────────────────────
    const VBadge = ({v}) => {
      const c={DEAL:"bg-green-500",REVIEW:"bg-yellow-500",PASS:"bg-red-500"};
      const l={DEAL:"✅ DEAL",REVIEW:"⚠️ REVIEW",PASS:"❌ PASS"};
      return React.createElement("span",{className:`${c[v]} text-white font-bold px-3 py-1 rounded-full text-xs`},l[v]);
    };

    const inp="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500";
    const F=({label,children,note})=>React.createElement("div",{className:"mb-3"},
      React.createElement("label",{className:"block text-xs text-gray-400 mb-1"},label,note&&React.createElement("span",{className:"ml-1 text-gray-500"},`(${note})`)),
      children
    );

    // ── API call (proxied through Node server) ────────────────────────────────
    async function callAPI(messages, maxTokens=1500) {
      const res = await fetch("/api/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, messages })
      });
      if (!res.ok) throw new Error(`Server error ${res.status}: ${await res.text()}`);
      const data = await res.json();
      const text = data?.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      if (!text) throw new Error("Empty response");
      return text;
    }

    // ── Report component ──────────────────────────────────────────────────────
    function ReportView({d,r}) {
      const sc=(ok,warn)=>ok?"text-green-400":warn?"text-yellow-400":"text-red-400";
      return React.createElement("div",{className:"bg-gray-900 text-white text-xs"},
        React.createElement("div",{className:"bg-indigo-800 rounded-xl p-4 mb-3"},
          React.createElement("div",{className:"flex justify-between items-start"},
            React.createElement("div",null,
              React.createElement("div",{className:"text-base font-bold"},d.address||"Property Address"),
              React.createElement("div",{className:"text-indigo-300"},[d.neighborhood,d.propType,d.beds&&`${d.beds}bd/${d.baths}ba`,d.garage&&`${d.garage} Garage`,d.yearBuilt&&`Built ${d.yearBuilt}`].filter(Boolean).join(" · ")),
              React.createElement("div",{className:"text-indigo-300 mt-1"},`Ask: ${fmtD(d.purchasePrice)} · ARV: ${fmtD(d.arv)} · ${d.holdMonths}mo hold · ${d.sqft?d.sqft.toLocaleString()+"sqft":"–"}`)
            ),
            React.createElement(VBadge,{v:r.verdict})
          )
        ),
        React.createElement("div",{className:"grid grid-cols-2 gap-3 mb-3"},
          React.createElement("div",{className:"bg-gray-800 rounded-xl p-3"},
            React.createElement("div",{className:"text-indigo-400 font-bold mb-2 uppercase tracking-wide"},"📊 Key Metrics"),
            [["Net Profit",fmtD(r.netProfit),r.meetsProfit,!r.meetsProfit],
             ["Profit %",fmtPct(r.profitPct),r.meetsRoi,r.profitPct<7.5],
             ["Profit / sqft","$"+fmt(r.profitPerSqft,2),r.meetsSqft,!r.meetsSqft],
             ["Price / sqft","$"+fmt(r.pricePerSqft,2),true,false],
             ["ARV / sqft","$"+fmt(r.arvPerSqft,2),true,false],
             ["Ann. Cash-on-Cash",fmtPct(r.annualizedCOC),r.annualizedCOC>0,r.annualizedCOC<0]
            ].map(([l,v,ok,warn])=>
              React.createElement("div",{key:l,className:"flex justify-between py-1 border-b border-gray-700"},
                React.createElement("span",{className:"text-gray-400"},l),
                React.createElement("span",{className:`font-bold ${sc(ok,warn)}`},v)
              )
            ),
            React.createElement("div",{className:"mt-2 text-gray-500"},"Targets: ≥$40K · 7.5–10% ROI · ≥$25/sqft"),
            r.maxPP_40k>0&&React.createElement("div",{className:"text-yellow-300 mt-1"},`Max PP for $40K: ${fmtD(r.maxPP_40k)}`),
            r.maxPP_75>0&&React.createElement("div",{className:"text-yellow-300"},`Max PP for 7.5%: ${fmtD(r.maxPP_75)}`)
          ),
          React.createElement("div",{className:"bg-gray-800 rounded-xl p-3"},
            React.createElement("div",{className:"text-indigo-400 font-bold mb-2 uppercase tracking-wide"},"💰 Cost Breakdown"),
            [["Purchase Price",d.purchasePrice],["Buy Costs",r.totalPurchaseCosts],["Rehab",d.rehabCost],["Holding Costs",r.totalHolding],["Sell Costs",r.totalSellCosts]].map(([l,v])=>
              React.createElement("div",{key:l,className:"flex justify-between py-1 border-b border-gray-700"},
                React.createElement("span",{className:"text-gray-400"},l),React.createElement("span",null,fmtD(v))
              )
            ),
            React.createElement("div",{className:"flex justify-between py-1 border-b border-gray-700 font-bold"},
              React.createElement("span",{className:"text-gray-300"},"Total All-In"),React.createElement("span",null,fmtD(d.arv-r.netProfit))
            ),
            React.createElement("div",{className:`flex justify-between pt-2 font-bold text-sm ${r.netProfit>=40000?"text-green-400":"text-red-400"}`},
              React.createElement("span",null,"Net Profit"),React.createElement("span",null,fmtD(r.netProfit))
            )
          )
        ),
        d.comps?.length>0&&React.createElement("div",{className:"bg-gray-800 rounded-xl p-3 mb-3"},
          React.createElement("div",{className:"text-blue-400 font-bold mb-2 uppercase tracking-wide"},"🏘️ Comparable Sales"),
          React.createElement("table",{className:"w-full text-xs"},
            React.createElement("thead",null,React.createElement("tr",{className:"text-gray-500 border-b border-gray-700"},
              ["Address","Bed/Bath","Sqft","Sale Price","$/sqft","Sold"].map(h=>React.createElement("th",{key:h,className:"text-left pb-1 pr-2"},h))
            )),
            React.createElement("tbody",null,d.comps.map((c,i)=>
              React.createElement("tr",{key:i,className:"border-b border-gray-700"},
                React.createElement("td",{className:"py-1 pr-2 text-white"},c.address),
                React.createElement("td",{className:"py-1 pr-2 text-gray-300"},`${c.beds}bd/${c.baths}ba`),
                React.createElement("td",{className:"py-1 pr-2 text-gray-300"},c.sqft?.toLocaleString()),
                React.createElement("td",{className:"py-1 pr-2 text-green-400 font-bold"},fmtD(c.salePrice)),
                React.createElement("td",{className:"py-1 pr-2 text-gray-300"},`$${c.pricePerSqft}/ft²`),
                React.createElement("td",{className:"py-1 text-gray-400"},c.soldDate)
              )
            ))
          )
        ),
        React.createElement("div",{className:"grid grid-cols-2 gap-3 mb-3"},
          React.createElement("div",{className:"bg-gray-800 rounded-xl p-3"},
            React.createElement("div",{className:"text-yellow-400 font-bold mb-2 uppercase tracking-wide"},"🔨 Rehab Notes"),
            React.createElement("div",{className:"text-gray-300 whitespace-pre-wrap leading-relaxed"},d.rehabNotes||"No rehab notes.")
          ),
          React.createElement("div",{className:"bg-gray-800 rounded-xl p-3"},
            React.createElement("div",{className:"text-blue-400 font-bold mb-2 uppercase tracking-wide"},"🏘️ ARV & Comps"),
            React.createElement("div",{className:"text-gray-300 whitespace-pre-wrap leading-relaxed"},d.arvNotes||"No comp notes.")
          )
        ),
        React.createElement("div",{className:"grid grid-cols-2 gap-3 mb-3"},
          React.createElement("div",{className:"bg-gray-800 rounded-xl p-3"},
            React.createElement("div",{className:"text-red-400 font-bold mb-2 uppercase tracking-wide"},"⚠️ Key Risks"),
            React.createElement("div",{className:"text-gray-300 whitespace-pre-wrap leading-relaxed"},d.riskNotes||"No risk notes.")
          ),
          React.createElement("div",{className:"bg-gray-800 rounded-xl p-3"},
            React.createElement("div",{className:"text-green-400 font-bold mb-2 uppercase tracking-wide"},"📋 Verdict"),
            React.createElement("div",{className:"flex items-center gap-2 mb-2"},React.createElement(VBadge,{v:r.verdict})),
            d.counterOffer&&React.createElement("div",{className:"text-yellow-300 mb-1"},`Counter: ${d.counterOffer}`),
            React.createElement("div",{className:"text-gray-300 whitespace-pre-wrap leading-relaxed"},d.verdict||"Run Advisor for full verdict.")
          )
        ),
        React.createElement("div",{className:"text-gray-600 text-center mt-2"},`Generated ${new Date().toLocaleDateString()} · New Growth Deal Analyzer`)
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [tab,setTab]=useState("📋 Smart Analysis");
      const [d,setD]=useState(DEF);
      const [history,setHistory]=useState([]);
      const [aiLoading,setAiLoading]=useState(false);
      const [aiMessages,setAiMessages]=useState([]);
      const [aiQuestion,setAiQuestion]=useState("");
      const [pasteText,setPasteText]=useState("");
      const [parsing,setParsing]=useState(false);
      const [showReport,setShowReport]=useState(false);
      const [saved,setSaved]=useState(false);

      const set=(k,v)=>setD(p=>({...p,[k]:v}));
      const num=(k,v)=>set(k,parseFloat(v)||0);
      const r=calc(d);

      const saveToHistory=()=>{
        setHistory(p=>[{id:Date.now(),address:d.address||"Unnamed",date:d.date,arv:d.arv,purchasePrice:d.purchasePrice,netProfit:r.netProfit,profitPct:r.profitPct,verdict:r.verdict},...p].slice(0,20));
        setSaved(true);
        setTimeout(()=>setSaved(false),3000);
      };

      const exportCSV=()=>{
        const rows=[["Field","Value"],["Address",d.address],["ARV",d.arv],["Purchase",d.purchasePrice],["Rehab",d.rehabCost],["Net Profit",r.netProfit.toFixed(0)],["ROI%",r.profitPct.toFixed(2)],["Profit/sqft",r.profitPerSqft.toFixed(2)],["Verdict",r.verdict]];
        const a=document.createElement("a");
        a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(",")).join("\n"));
        a.download=`deal-${d.address||"analysis"}.csv`;a.click();
      };

      const smartParse=useCallback(async()=>{
        if(!pasteText.trim())return;
        setParsing(true);
        try{
          const text=await callAPI([{role:"user",content:`Extract data from this wholesale real estate listing and return ONLY a raw JSON object. No markdown, no backticks, no explanation — just the JSON.\n\nLISTING:\n${pasteText}\n\nReturn this exact JSON structure with your best estimates for missing values:\n{"address":"","state":"","zip":"","neighborhood":"","propType":"Single family rehab","beds":"","baths":"","garage":"","yearBuilt":"","purchasePrice":0,"sqft":0,"arv":0,"asisValue":0,"wholesaleValue":0,"rehabCost":0,"holdMonths":6,"firstMortgagePct":80,"firstMortgageRate":11,"originationCost":0,"propertyTaxes":0,"rehabNotes":"","arvNotes":"","riskNotes":"","verdict":"","counterOffer":"","comps":[]}\n\nRules:\n- purchasePrice = cash asking price as a number\n- sqft = estimate from beds/baths/era if not stated\n- arv = market estimate based on location/beds/baths/condition after rehab\n- asisValue = typically 5-15% above purchasePrice for wholesale\n- originationCost = purchasePrice * 0.025\n- propertyTaxes = local annual estimate divided by 2\n- rehabNotes = line-item rehab breakdown\n- arvNotes = 2-3 sentences explaining ARV\n- riskNotes = top 3 risks numbered\n- comps = array of nearby sold comps: [{"address":"","beds":"","baths":"","sqft":0,"salePrice":0,"pricePerSqft":0,"soldDate":"","notes":""}]`}]);
          const clean=text.replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"").trim();
          const parsed=JSON.parse(clean);
          setD(p=>({...p,...parsed,comps:Array.isArray(parsed.comps)?parsed.comps:[]}));
          setTab("📊 Analysis");
        }catch(e){alert(`Smart Analysis error: ${e.message}`);}
        setParsing(false);
      },[pasteText]);

      const buildContext=useCallback(()=>
        `DEAL CONTEXT:\nProperty: ${d.address||"Unknown"} | ${d.propType} | ${d.beds}bd/${d.baths}ba | Built ${d.yearBuilt} | ${d.sqft} sqft\nNeighborhood: ${d.neighborhood||"Unknown"}\nARV: ${fmtD(d.arv)} | Ask Price: ${fmtD(d.purchasePrice)} | Rehab Est: ${fmtD(d.rehabCost)}\nHold: ${d.holdMonths}mo | Financing: ${d.firstMortgagePct}% LTV @ ${d.firstMortgageRate}%\nNet Profit: ${fmtD(r.netProfit)} | ROI: ${fmtPct(r.profitPct)} | Profit/sqft: $${fmt(r.profitPerSqft,2)}\nMax Purchase for $40K profit: ${fmtD(r.maxPP_40k)} | Max Purchase for 7.5% ROI: ${fmtD(r.maxPP_75)}\nTeam Targets: ≥$40K net profit · ROI 7.5–10% · ≥$25/sqft profit`
      ,[d,r]);

      const askAI=useCallback(async(isFollowUp=false,followUpText="")=>{
        if(d.arv===0)return;
        setAiLoading(true);
        let messages;
        if(!isFollowUp){
          const ctx=buildContext();
          const prompt=`You are an expert fix-and-flip real estate investment advisor. ${ctx}\n\n${aiQuestion?`QUESTION TO ANSWER FIRST: ${aiQuestion}\n\nAnswer the above question directly before the rest of the analysis.\n\n`:""}\nProvide your response in these sections:\n\nDEAL ASSESSMENT\nOverall verdict — is this worth pursuing and why?\n\nKEY RISKS\nTop 3 risks, numbered.\n\nNEGOTIATION & COUNTER-OFFER\nSpecific price recommendation with dollar-figure justification.\n\nSELLER TALKING POINTS\n5–7 specific, persuasive talking points to justify the counter-offer in a conversation with the seller.\n\nWHOLESALE FLAGS\nAssignment fee concerns, contract issues, or double-close considerations.\n\nACTION ITEMS\n3 specific next steps.\n\nFOLLOW-UP QUESTIONS\n2–3 questions that would sharpen this analysis if answered.`;
          messages=[{role:"user",content:prompt}];
          setAiMessages(messages);
        }else{
          const ctx=buildContext();
          const followUp={role:"user",content:`[Updated context: ${ctx}]\n\nMy response: ${followUpText}\n\nProvide an updated analysis with these new details.`};
          const updated=[...aiMessages,followUp];
          setAiMessages(updated);
          messages=updated;
        }
        try{
          const text=await callAPI(messages,1200);
          setAiMessages(prev=>[...prev,{role:"assistant",content:text}]);
          if(!d.counterOffer){const m=text.match(/\$[\d,]+(?:\s*[–-]\s*\$[\d,]+)?/);if(m)set("counterOffer",m[0]);}
          if(!d.verdict)set("verdict",text.split("\n").find(l=>l.trim())??"");
        }catch(e){
          setAiMessages(prev=>[...prev,{role:"assistant",content:`⚠️ Error: ${e.message}`}]);
        }
        setAiLoading(false);
        setAiQuestion("");
      },[d,r,aiMessages,aiQuestion,buildContext]);

      const counterDisplay=d.counterOffer?(d.counterOffer.match(/\$[\d,]+(?:\s*[–-]\s*\$[\d,]+)?/)?.[0]||d.counterOffer):null;

      return React.createElement("div",{className:"min-h-screen bg-gray-900 text-white"},
        // Header
        React.createElement("div",{className:"bg-gray-800 border-b border-gray-700 px-4 py-3 flex items-center justify-between"},
          React.createElement("div",null,
            React.createElement("h1",{className:"text-base font-bold"},"🏠 New Growth Deal Analyzer"),
            React.createElement("p",{className:"text-xs text-gray-400"},
              d.address||"No property loaded",
              d.arv>0&&React.createElement("span",null,` · ARV ${fmtD(d.arv)}`),
              d.purchasePrice>0&&React.createElement("span",{className:"text-yellow-300"},` · Ask ${fmtD(d.purchasePrice)}`),
              counterDisplay&&React.createElement("span",{className:"text-orange-400"},` · Counter ${counterDisplay}`)
            )
          ),
          React.createElement("div",{className:"flex items-center gap-2"},
            d.arv>0&&React.createElement(VBadge,{v:r.verdict}),
            d.arv>0&&React.createElement("button",{onClick:()=>setShowReport(s=>!s),className:"bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded-lg text-xs"},showReport?"Hide":"📄 Report")
          )
        ),

        // Report overlay
        showReport&&React.createElement("div",{className:"max-w-3xl mx-auto p-4"},
          React.createElement(ReportView,{d,r}),
          React.createElement("div",{className:"flex gap-2 mt-3"},
            React.createElement("button",{onClick:saveToHistory,className:"bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm"},saved?"✅ Saved!":"💾 Save"),
            React.createElement("button",{onClick:exportCSV,className:"bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm"},"📥 CSV"),
            React.createElement("button",{onClick:()=>setShowReport(false),className:"bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm"},"✕ Close")
          )
        ),

        // Main content
        !showReport&&React.createElement(React.Fragment,null,
          // Tabs
          React.createElement("div",{className:"flex border-b border-gray-700 bg-gray-800 overflow-x-auto"},
            TABS.map(t=>React.createElement("button",{key:t,onClick:()=>setTab(t),
              className:`px-4 py-2 text-xs font-medium whitespace-nowrap transition-colors ${tab===t?"border-b-2 border-indigo-500 text-indigo-400":"text-gray-400 hover:text-white"}`},t))
          ),

          React.createElement("div",{className:"max-w-4xl mx-auto p-4"},

            // ── Smart Analysis tab ──
            tab==="📋 Smart Analysis"&&React.createElement("div",{className:"space-y-4"},
              React.createElement("div",{className:"bg-gray-800 rounded-xl p-4"},
                React.createElement("h2",{className:"text-sm font-bold text-indigo-400 mb-1"},"📋 Smart Analysis"),
