<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Growth Deal Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
  <style>
    body { background:#111827; color:#fff; font-family:system-ui,sans-serif; margin:0; }
    * { box-sizing:border-box; }
    @media print {
      body { background:#fff !important; color:#000 !important; }
      #root { background:#fff !important; }
      .no-print { display:none !important; }
      .print-section { page-break-inside:avoid; }
      .bg-gray-800,.bg-gray-900,.bg-gray-700 { background:#f3f4f6 !important; }
      .bg-indigo-800 { background:#e0e7ff !important; }
      .bg-green-900 { background:#dcfce7 !important; }
      .bg-red-900,.bg-red-950 { background:#fee2e2 !important; }
      .bg-yellow-900 { background:#fef9c3 !important; }
      .text-white,.text-gray-200,.text-gray-300 { color:#111 !important; }
      .text-gray-400,.text-gray-500,.text-gray-600 { color:#555 !important; }
      .text-indigo-400,.text-indigo-300 { color:#4338ca !important; }
      .text-green-400,.text-green-300 { color:#15803d !important; }
      .text-red-400,.text-red-300 { color:#b91c1c !important; }
      .text-yellow-300,.text-yellow-400 { color:#854d0e !important; }
      .text-orange-400,.text-orange-300 { color:#c2410c !important; }
      .text-blue-400 { color:#1d4ed8 !important; }
      .border-gray-700,.border-gray-600 { border-color:#d1d5db !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="error" style="display:none;color:#f87171;padding:2rem;font-family:monospace;white-space:pre-wrap;"></div>
  <script>
    window.onerror = function(msg, src, line) {
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent = "JS Error: " + msg + "\nLine: " + line + "\nSource: " + src;
      document.getElementById("root").style.display = "none";
    };
  </script>

  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    const fmt    = (n,d=0) => isNaN(n)||!isFinite(n)?"-":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
    const fmtPct = (n,d=1) => isNaN(n)||!isFinite(n)?"-":n.toFixed(d)+"%";
    const fmtD   = (n,d=0) => isNaN(n)||!isFinite(n)?"-":"$"+fmt(n,d);
    const clamp  = n => (isNaN(n)||!isFinite(n))?0:n;

    const TABS = ["📋 Smart Analysis","⚙️ Inputs","📊 Analysis","🗣️ Talk to Marco","📁 History"];

    const VOICE_PROFILES = {
      mentor: {
        label: "Marco",
        desc: "Your deal advisor. Explains the reasoning behind every number and recommendation.",
        persona: "Your name is Marco. You are a patient, knowledgeable real estate mentor and deal advisor who loves teaching and guiding investors. You explain every recommendation clearly, walk through the math step by step, and make sure the reader understands not just what to do but why. You're supportive but honest — if a deal doesn't work, you say so plainly and explain exactly why.",
        style: "After each conclusion, briefly explain the reasoning behind it. Define any industry terms used. Use plain, conversational language. Structure your response so any team member could follow along and learn from it. Sign off responses as Marco.",
      },
    };

    const DEF = {
      address:"",date:new Date().toISOString().slice(0,10),propType:"Single family rehab",
      arv:0,asisValue:0,wholesaleValue:0,rehabCost:0,purchasePrice:0,
      sqft:0,units:1,holdMonths:6,occupied:false,taxBracket:0,
      firstMortgagePct:80,firstMortgageRate:11,secondMortgagePct:0,secondMortgageRate:0,
      internalCapitalRate:0,originationCost:0,propertyTaxes:1200,prepaymentPenalties:0,
      sellingRecordingFees:200,realtorPct:3,transferTaxPct:0.12,homeWarranty:500,
      staging:1500,marketing:500,utilityMonthly:200,
      beds:"",baths:"",garage:"",yearBuilt:"",neighborhood:"",state:"",zip:"",
      rehabNotes:"",arvNotes:"",riskNotes:"",verdict:"",counterOffer:"",comps:[],
    };

    function calc(d) {
      const pp=d.purchasePrice, arv=d.arv, sqft=d.sqft||1;
      const escrowSell=(arv*4)/1000, realtorFee=arv*(d.realtorPct/100);
      const transferTax=arv*(d.transferTaxPct/100);
      const totalSellCosts=escrowSell+realtorFee+transferTax+d.homeWarranty+d.staging+d.marketing+d.sellingRecordingFees;
      const netSalesPrice=arv-totalSellCosts;
      const escrowBuy=(pp*4)/1000, titleIns=500+pp*0.0025;
      const recFeesBuy=d.originationCost>0?200:100, titleSearch=225;
      const totalPurchaseCosts=escrowBuy+d.originationCost+titleIns+recFeesBuy+titleSearch;
      const firstMtg=pp*(d.firstMortgagePct/100), secondMtg=pp*(d.secondMortgagePct/100);
      const downPayment=pp-firstMtg-secondMtg;
      const insRate=d.occupied?(0.77/1000):(6/1000);
      const insuranceHold=(pp*insRate+500)*(d.holdMonths/12);
      const utilities=d.utilityMonthly*d.holdMonths;
      const firstMtgInt=firstMtg*(d.firstMortgageRate/100)*(d.holdMonths/12);
      const secondMtgInt=secondMtg*(d.secondMortgageRate/100)*(d.holdMonths/12);
      const rehabHold=(d.rehabCost/2)*(d.internalCapitalRate/100)*(d.holdMonths/12);
      const financingCosts=firstMtgInt+secondMtgInt+rehabHold;
      const totalHolding=insuranceHold+d.propertyTaxes+utilities+financingCosts+d.prepaymentPenalties;
      const netProfit=netSalesPrice-pp-totalPurchaseCosts-d.rehabCost-totalHolding;
      const profitPct=(netProfit/arv)*100;
      const profitPerSqft=netProfit/sqft, pricePerSqft=pp/sqft, arvPerSqft=arv/sqft;
      const totalCommitted=downPayment+(d.rehabCost/2);
      const annualizedCOC=totalCommitted>0?((netProfit/totalCommitted)/(d.holdMonths/12))*100:0;

      // ✅ No upper limit — more profit is always good
      const meetsProfit=netProfit>=40000;
      const meetsRoi=profitPct>=7.5;
      const meetsSqft=profitPerSqft>=25;
      const passCount=[meetsProfit,meetsRoi,meetsSqft].filter(Boolean).length;
      const verdict=(meetsProfit&&meetsRoi&&meetsSqft)?"DEAL":passCount>=2?"REVIEW":"PASS";

      // Max purchase prices for each qualifier
      const maxPP_40k    = arv - totalSellCosts - d.rehabCost - totalHolding - totalPurchaseCosts - 40000;
      const maxPP_75     = arv*(1-0.075) - totalSellCosts - d.rehabCost - totalHolding - totalPurchaseCosts;
      const maxPP_25sqft = arv - totalSellCosts - d.rehabCost - totalHolding - totalPurchaseCosts - (25*sqft);
      const bindingMaxPP = Math.min(maxPP_40k, maxPP_75, maxPP_25sqft);

      return {
        escrowSell,realtorFee,transferTax,totalSellCosts,netSalesPrice,
        escrowBuy,titleIns,recFeesBuy,titleSearch,totalPurchaseCosts,
        firstMtg,secondMtg,downPayment,insuranceHold,utilities,
        firstMtgInt,secondMtgInt,rehabHold,financingCosts,totalHolding,
        netProfit,profitPct,profitPerSqft,pricePerSqft,arvPerSqft,
        totalCommitted,annualizedCOC,meetsProfit,meetsRoi,meetsSqft,verdict,
        maxPP_40k,maxPP_75,maxPP_25sqft,bindingMaxPP,
        breakdown:[
          {name:"Purchase",value:clamp(pp),fill:"#6366f1"},
          {name:"Buy Costs",value:clamp(totalPurchaseCosts),fill:"#8b5cf6"},
          {name:"Rehab",value:clamp(d.rehabCost),fill:"#f59e0b"},
          {name:"Holding",value:clamp(totalHolding),fill:"#f97316"},
          {name:"Sell Costs",value:clamp(totalSellCosts),fill:"#ef4444"},
          {name:"Net Profit",value:clamp(netProfit),fill:netProfit>=0?"#22c55e":"#dc2626"},
        ]
      };
    }

    // Pure CSS bar chart
    function BarChart({data}) {
      const max=Math.max(...data.map(d=>Math.abs(d.value)),1);
      return (
        <div style={{display:"flex",alignItems:"flex-end",gap:8,height:150,padding:"0 4px"}}>
          {data.map((d,i)=>{
            const pct=Math.min((Math.abs(d.value)/max)*100,100);
            const label=d.value>=0?"$"+(d.value>=1000?(d.value/1000).toFixed(0)+"K":d.value.toFixed(0)):"-$"+(Math.abs(d.value)>=1000?(Math.abs(d.value)/1000).toFixed(0)+"K":Math.abs(d.value).toFixed(0));
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%",justifyContent:"flex-end"}}>
                <div style={{fontSize:9,color:"#9ca3af",textAlign:"center"}}>{label}</div>
                <div style={{width:"100%",height:pct+"%",background:d.fill,borderRadius:"4px 4px 0 0",minHeight:4}}/>
                <div style={{fontSize:9,color:"#9ca3af",textAlign:"center",lineHeight:1.2}}>{d.name}</div>
              </div>
            );
          })}
        </div>
      );
    }

    const VBadge = ({v}) => {
      const c={DEAL:"bg-green-500",REVIEW:"bg-yellow-500",PASS:"bg-red-500"};
      const l={DEAL:"✅ DEAL",REVIEW:"⚠️ REVIEW",PASS:"❌ PASS"};
      return <span className={`${c[v]} text-white font-bold px-3 py-1 rounded-full text-xs`}>{l[v]}</span>;
    };

    const inp="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500";
    const F=({label,children,note})=>(
      <div className="mb-3">
        <label className="block text-xs text-gray-400 mb-1">{label}{note&&<span className="ml-1 text-gray-500">({note})</span>}</label>
        {children}
      </div>
    );

    async function callAPI(messages, maxTokens=1500) {
      const res=await fetch("/api/analyze",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:maxTokens,messages})
      });
      if(!res.ok) throw new Error(`Server error ${res.status}: ${await res.text()}`);
      const data=await res.json();
      const text=data?.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      if(!text) throw new Error("Empty response");
      return text;
    }


    function CompsTable({comps, arv, subject, onApplyArv, arvSource}) {
      if(!comps||comps.length===0) return null;

      const subjectSqft = subject?.sqft || 0;

      // Build comps with psf
      const compsWithPsf = comps.map(c => {
        const psf = c.pricePerSqft || (c.sqft && c.salePrice ? Math.round(c.salePrice / c.sqft) : 0);
        return { ...c, psf };
      }).filter(c => c.psf > 0 && c.salePrice > 0);

      // Filter outliers — remove comps outside 1.5× IQR
      let filtered = compsWithPsf;
      if (compsWithPsf.length >= 4) {
        const sorted = [...compsWithPsf].sort((a,b) => a.psf - b.psf);
        const q1 = sorted[Math.floor(sorted.length * 0.25)].psf;
        const q3 = sorted[Math.floor(sorted.length * 0.75)].psf;
        const iqr = q3 - q1;
        filtered = compsWithPsf.filter(c => c.psf >= q1 - 1.5*iqr && c.psf <= q3 + 1.5*iqr);
        if (filtered.length < 2) filtered = compsWithPsf; // fallback if too aggressive
      }

      const avgPsf = filtered.length > 0
        ? Math.round(filtered.reduce((s,c) => s + c.psf, 0) / filtered.length)
        : 0;

      const avgCompSqft = filtered.length > 0
        ? Math.round(filtered.reduce((s,c) => s + (c.sqft||0), 0) / filtered.length)
        : 0;

      const maxCompSalePrice = filtered.length > 0
        ? Math.max(...filtered.map(c => c.salePrice || 0))
        : 0;

      const rawPsfArv = subjectSqft > 0 && avgPsf > 0 ? Math.round(avgPsf * subjectSqft) : 0;

      // Flag if prediction runs more than 10% over the highest comp — comps may be too small/mismatched.
      const exceedsComps = maxCompSalePrice > 0 && rawPsfArv > maxCompSalePrice * 1.10;
      const subjectLargerThanComps = avgCompSqft > 0 && subjectSqft > avgCompSqft * 1.15;
      const predictedArv = rawPsfArv;

      const removedCount = compsWithPsf.length - filtered.length;

      // Variance from entered ARV
      const arvDiff  = predictedArv > 0 && arv > 0 ? predictedArv - arv : null;
      const pctDiff  = arvDiff !== null && arv > 0 ? (arvDiff / arv) * 100 : null;
      const variance = pctDiff !== null ? Math.abs(pctDiff) : null;

      return (
        <div>
          <div className="overflow-x-auto mb-3">
            <table className="w-full text-xs">
              <thead><tr className="text-gray-500 border-b border-gray-700">
                {["Address","Bed/Bath","Sqft","Sale Price","$/sqft","Sold"].map(h=>(
                  <th key={h} className="text-left pb-1 pr-3 font-medium">{h}</th>
                ))}
              </tr></thead>
              <tbody>{comps.map((c,i)=>{
                const psf = c.pricePerSqft||(c.sqft&&c.salePrice?Math.round(c.salePrice/c.sqft):0);
                const isOutlier = compsWithPsf.length >= 4 && !filtered.find(f => f.address===c.address && f.salePrice===c.salePrice);
                const flags = c.matchFlags || [];
                const hasFlags = flags.length > 0 || isOutlier;
                // Match quality: no flags = green, 1 flag = yellow, 2+ or outlier = red
                const matchColor = isOutlier ? "text-red-400" : flags.length === 0 ? "text-green-400" : flags.length === 1 ? "text-yellow-400" : "text-red-400";
                const matchDot   = isOutlier ? "🔴" : flags.length === 0 ? "🟢" : flags.length === 1 ? "🟡" : "🔴";
                return (
                  <tr key={i} className={`border-b border-gray-700 ${isOutlier?"opacity-50":""}`}>
                    <td className="py-1 pr-3">
                      <div className="text-white font-medium">{c.address||`Comp #${i+1}`}</div>
                      {hasFlags&&(
                        <div className={`text-xs mt-0.5 ${matchColor}`}>
                          {matchDot} {isOutlier?"$/sqft outlier":flags.join(" · ")}
                        </div>
                      )}
                    </td>
                    <td className="py-1 pr-3 text-gray-300 whitespace-nowrap">{c.beds||"—"}bd/{c.baths||"—"}ba</td>
                    <td className="py-1 pr-3 text-right text-gray-300">{c.sqft?c.sqft.toLocaleString():"—"}</td>
                    <td className="py-1 pr-3 text-right text-green-400 font-bold">{fmtD(c.salePrice)}</td>
                    <td className="py-1 pr-3 text-right text-gray-300">${psf||"—"}/ft²</td>
                    <td className="py-1 pr-3 text-right text-gray-400">{c.soldDate||"—"}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>

          {/* ARV Prediction Panel */}
          {predictedArv > 0 && (
            <div className={`rounded-lg p-3 ${exceedsComps?"bg-yellow-950 border border-yellow-700":"bg-gray-700"}`}>
              <div className="text-xs font-semibold text-indigo-300 mb-2">📐 Comp-Based ARV Prediction</div>

              {/* Weak comps warning */}
              {exceedsComps&&(
                <div className="bg-yellow-900 border border-yellow-600 rounded p-2 mb-2 text-xs text-yellow-200">
                  ⚠️ <span className="font-semibold">Prediction runs more than 10% above the highest comp ({fmtD(maxCompSalePrice)}).</span> Subject is {subjectSqft.toLocaleString()} ft² but avg comp is only {avgCompSqft.toLocaleString()} ft² — smaller homes carry a higher $/sqft that may not apply here. Consider pulling larger or more similar comps to validate this ARV.
                </div>
              )}

              <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs mb-2">
                <div className="text-gray-400">Comps used ({filtered.length} of {compsWithPsf.length}{removedCount>0?`, ${removedCount} outlier${removedCount>1?"s":""} excluded`:""})</div>
                <div className="text-right text-white font-medium">${avgPsf}/ft² avg</div>
                <div className="text-gray-400">Avg comp size</div>
                <div className={`text-right font-medium ${exceedsComps?"text-yellow-400":"text-white"}`}>{avgCompSqft.toLocaleString()} ft²</div>
                <div className="text-gray-400">Subject sqft</div>
                <div className="text-right text-white">{subjectSqft.toLocaleString()} ft²</div>
                {exceedsComps&&(
                  <><div className="text-gray-400">Highest comp sale</div><div className="text-right text-yellow-300">{fmtD(maxCompSalePrice)}</div></>
                )}

              </div>
              <div className="flex items-center justify-between border-t border-gray-600 pt-2">
                <div>
                  <div className="text-xs text-gray-400">{avgPsf+"/ft² × "+subjectSqft.toLocaleString()+" ft²"}</div>
                  <div className={`text-xl font-bold ${exceedsComps?"text-yellow-300":"text-white"}`}>{fmtD(predictedArv)}</div>
                  {arvSource==="comps"&&arv===predictedArv&&(
                    <div className="text-xs text-indigo-400 mt-0.5">✅ Active ARV — comp-derived</div>
                  )}
                  {arvSource==="manual"&&(
                    <div className="text-xs text-gray-400 mt-0.5">✏️ ARV manually set — not auto-updating</div>
                  )}
                  {arvSource==="ai"&&(
                    <div className="text-xs text-yellow-400 mt-0.5">⚠️ ARV set by AI estimate — comp prediction differs</div>
                  )}
                  {arvDiff!==null&&!(arvSource==="comps"&&arv===predictedArv)&&(
                    <div className={`text-xs mt-0.5 ${variance<5?"text-green-400":variance<10?"text-yellow-400":"text-red-400"}`}>
                      {arvDiff>=0?"+":""}{fmtD(arvDiff)} vs your ARV ({pctDiff>=0?"+":""}{pctDiff.toFixed(1)}%)
                    </div>
                  )}
                </div>
                {onApplyArv&&(
                  <button onClick={()=>onApplyArv(predictedArv)}
                    className="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg">
                    Apply ARV ↗
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }


    function ReportView({d,r,arvAnalysis}) {
      const sc=(ok)=>ok?"text-green-400":"text-red-400";
      return (
        <div className="bg-gray-900 text-white text-xs">
          <div className="bg-indigo-800 rounded-xl p-4 mb-3">
            <div className="flex justify-between items-start">
              <div>
                <div className="text-base font-bold">{d.address||"Property Address"}</div>
                <div className="text-indigo-300">{[d.neighborhood,d.propType,d.beds&&`${d.beds}bd/${d.baths}ba`,d.garage&&`${d.garage} Garage`,d.yearBuilt&&`Built ${d.yearBuilt}`].filter(Boolean).join(" · ")}</div>
                <div className="text-indigo-300 mt-1">Ask: {fmtD(d.purchasePrice)} · ARV: {fmtD(d.arv)} · {d.holdMonths}mo hold · {d.sqft?d.sqft.toLocaleString()+"sqft":"–"}</div>
              </div>
              <VBadge v={r.verdict}/>
            </div>
          </div>
          {/* Key Metrics */}
          <div className="bg-gray-800 rounded-xl p-3 mb-3">
            <div className="text-indigo-400 font-bold mb-2 uppercase tracking-wide">📊 Key Metrics</div>
            <div className="grid grid-cols-2 gap-x-6">
              {[
                ["Net Profit",fmtD(r.netProfit),r.meetsProfit,"≥$40K"],
                ["Profit %",fmtPct(r.profitPct),r.meetsRoi,"≥7.5% of ARV"],
                ["Profit / sqft","$"+fmt(r.profitPerSqft,2),r.meetsSqft,"≥$25/sqft"],
                ["Ann. Cash-on-Cash",fmtPct(r.annualizedCOC),r.annualizedCOC>0,""],
                ["Price / sqft","$"+fmt(r.pricePerSqft,2),true,""],
                ["ARV / sqft","$"+fmt(r.arvPerSqft,2),true,""],
              ].map(([l,v,ok,target])=>(
                <div key={l} className="flex justify-between py-1 border-b border-gray-700">
                  <span className="text-gray-400">{l}{target&&<span className="text-gray-500 ml-1">({target})</span>}</span>
                  <span className={`font-bold ${sc(ok)}`}>{v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* ── DETAILED COST BREAKDOWN ── */}
          <div className="space-y-3 mb-3">

            {/* 1. Selling Revenue */}
            <div className="bg-gray-800 rounded-xl p-3">
              <div className="text-green-400 font-bold mb-2 uppercase tracking-wide">💵 Selling Revenue</div>
              <div className="flex justify-between py-1 border-b border-gray-700">
                <span className="text-gray-300 font-semibold">Gross Sales Price (ARV)</span>
                <span className="font-bold text-green-300">{fmtD(d.arv)}</span>
              </div>
              <div className="mt-1 ml-3 space-y-0.5">
                {[
                  ["Escrow Fees","ARV × $4 per $1,000",r.escrowSell],
                  ["Realtor Commission",`ARV × ${d.realtorPct}%`,r.realtorFee],
                  ["Transfer Tax",`ARV × ${d.transferTaxPct}%`,r.transferTax],
                  ["Home Warranty","Fixed",d.homeWarranty],
                  ["Staging","Fixed",d.staging],
                  ["Marketing","Fixed",d.marketing],
                  ["Recording Fees (Sell)","Fixed",d.sellingRecordingFees],
                ].map(([l,basis,v])=>(
                  <div key={l} className="flex justify-between py-0.5 border-b border-gray-700/50">
                    <span className="text-gray-400">− {l} <span className="text-gray-600 italic">({basis})</span></span>
                    <span className="text-red-300">{fmtD(v)}</span>
                  </div>
                ))}
              </div>
              <div className="flex justify-between py-1.5 mt-1 border-t border-gray-600 font-bold">
                <span className="text-gray-200">Net Sales Price</span>
                <span className="text-green-300">{fmtD(r.netSalesPrice)}</span>
              </div>
            </div>

            {/* 2. Purchase & Buying Costs */}
            <div className="bg-gray-800 rounded-xl p-3">
              <div className="text-purple-400 font-bold mb-2 uppercase tracking-wide">🏠 Purchase & Buying Costs</div>
              <div className="flex justify-between py-1 border-b border-gray-700">
                <span className="text-gray-300 font-semibold">Purchase Price</span>
                <span className="font-bold text-purple-300">{fmtD(d.purchasePrice)}</span>
              </div>
              <div className="text-gray-500 text-xs mt-1 mb-0.5 ml-1">Buying Closing Costs:</div>
              <div className="ml-3 space-y-0.5">
                {[
                  ["Escrow Fees","PP × $4 per $1,000",r.escrowBuy],
                  ["Financing Origination","Fixed / entered",d.originationCost],
                  ["Title Insurance","$500 + (PP × 0.25%)",r.titleIns],
                  ["Recording Fees (Buy)",d.originationCost>0?"Mortgage present → $200":"No mortgage → $100",r.recFeesBuy],
                  ["Title Search","Fixed $225",r.titleSearch],
                ].map(([l,basis,v])=>(
                  <div key={l} className="flex justify-between py-0.5 border-b border-gray-700/50">

          {/* Adjusted ARV in Report */}
          {arvAnalysis&&!arvAnalysis.error&&(

                        <td className={`py-1 pr-2 text-right ${row.ageAdj>=0?"text-green-400":"text-red-400"}`}>{row.ageAdj>=0?"+":""}{fmtD(row.ageAdj)}</td>

          <div className="grid grid-cols-2 gap-3 mb-3">

              <div className="text-blue-400 font-bold mb-2 uppercase tracking-wide">🏘️ ARV & Comps</div>

            </div>
          </div>

            <div className="bg-gray-800 rounded-xl p-3">

              <div className="text-gray-300 whitespace-pre-wrap leading-relaxed">{d.riskNotes||"No risk notes."}</div>
            </div>
            <div className="bg-gray-800 rounded-xl p-3">

              <div className="text-gray-300 whitespace-pre-wrap leading-relaxed">{d.verdict||"Run Advisor for full verdict."}</div>

          <div className="text-gray-600 text-center mt-2">Generated {new Date().toLocaleDateString()} · New Growth Deal Analyzer</div>
        </div>
      );
    }

    function App() {
      const [tab,setTab]=useState("📋 Smart Analysis");
      const [d,setD]=useState(DEF);
      const [history,setHistory]=useState([]);
      const [historyLoading,setHistoryLoading]=useState(false);
      const [historyError,setHistoryError]=useState("");
      const [aiLoading,setAiLoading]=useState(false);
      const [aiMessages,setAiMessages]=useState([]);
      const [aiQuestion,setAiQuestion]=useState("");
      const [pasteText,setPasteText]=useState("");
      const [parsing,setParsing]=useState(false);
      const [showReport,setShowReport]=useState(false);
      const [saved,setSaved]=useState(false);
      const [arvAnalysis,setArvAnalysis]=useState(null);
      const [arvLoading,setArvLoading]=useState(false);
      const [arvSource,setArvSource]=useState("none"); // "none"|"ai"|"comps"|"manual"
      const arvSourceRef=React.useRef("none"); // mirrors arvSource synchronously for useEffect guard
      const smartParseActiveRef=React.useRef(false); // suppresses address-debounce ATTOM fetch during Smart Analysis
      const [attomLoading,setAttomLoading]=useState(false);
      const [attomResult,setAttomResult]=useState(null); // {sources, property, avm, tax, comps}
      const [attomConfigured,setAttomConfigured]=useState(null); // null=unknown, true/false

      const set=(k,v)=>setD(p=>({...p,[k]:v}));
      const num=(k,v)=>set(k,parseFloat(v)||0);
      const r=calc(d);

      // Compute predictedArv from comps at App level so ATTOM fetch can auto-apply it
      const appPredictedArv = React.useMemo(()=>{
        const comps = d.comps || [];
        const sqft  = d.sqft  || 0;
        if(!sqft || comps.length===0) return 0;
        const withPsf = comps.map(c=>{
          const psf = c.pricePerSqft||(c.sqft&&c.salePrice?Math.round(c.salePrice/c.sqft):0);
          return {...c,psf};
        }).filter(c=>c.psf>0&&c.salePrice>0);
        if(withPsf.length===0) return 0;
        let filtered = withPsf;
        if(withPsf.length>=4){
          const sorted=[...withPsf].sort((a,b)=>a.psf-b.psf);
          const q1=sorted[Math.floor(sorted.length*0.25)].psf;
          const q3=sorted[Math.floor(sorted.length*0.75)].psf;
          const iqr=q3-q1;
          const f=withPsf.filter(c=>c.psf>=q1-1.5*iqr&&c.psf<=q3+1.5*iqr);
          if(f.length>=2) filtered=f;
        }
        const avgPsf=Math.round(filtered.reduce((s,c)=>s+c.psf,0)/filtered.length);
        return Math.round(avgPsf*sqft);
      },[d.comps,d.sqft]);

      // arvSource ref kept in sync manually at each callsite — no useEffect to avoid timing races

      // Load history from DB on mount and when switching to History tab
      const fetchHistory=useCallback(async()=>{
        setHistoryLoading(true);
        setHistoryError("");
        try{
          const res=await fetch("/api/history");
          const data=await res.json();
          if(data.ok){
            setHistory(data.deals.map(row=>({
              id: row.id,
              savedAt: new Date(row.saved_at).toLocaleString(),
              address: row.address,
              verdict: row.verdict,
              arv: parseFloat(row.arv)||0,
              purchasePrice: parseFloat(row.purchase_price)||0,
              netProfit: parseFloat(row.net_profit)||0,
              profitPct: parseFloat(row.profit_pct)||0,
              // pull display fields from snapshot
              rehabCost: row.snapshot?.rehabCost||0,
              profitPerSqft: row.snapshot?.profitPerSqft||0,
              bindingMaxPP: row.snapshot?.bindingMaxPP||0,
              beds: row.snapshot?.beds||"",
              baths: row.snapshot?.baths||"",
              sqft: row.snapshot?.sqft||0,
              neighborhood: row.snapshot?.neighborhood||"",
              holdMonths: row.snapshot?.holdMonths||6,
              compsCount: row.snapshot?.comps?.length||0,
              pasteText: row.snapshot?.pasteText||"",
              arvSource: row.snapshot?.arvSource||"manual",
              deal: row.snapshot?.deal||row.snapshot,
            })));
          } else {
            setHistoryError(data.error||"Failed to load history");
          }
        }catch(e){
          setHistoryError("Cannot reach server: "+e.message);
        }
        setHistoryLoading(false);
      },[]);

      useEffect(()=>{ fetchHistory(); },[]);

      // Check if ATTOM key is configured
      useEffect(()=>{
        fetch("/api/attom/status").then(r=>r.json()).then(d=>setAttomConfigured(d.configured)).catch(()=>setAttomConfigured(false));
      },[]);

      // Auto-fetch ATTOM data when address changes (debounced 1.2s)
      // Suppressed during Smart Analysis — it handles its own ATTOM fetch
      useEffect(()=>{
        if(!d.address||d.address.trim().length<10) return;
        if(!attomConfigured) return;
        if(smartParseActiveRef.current) return;
        const timer=setTimeout(async()=>{
          setAttomLoading(true);
          setAttomResult(null);
          try{
            const res=await fetch("/api/attom/lookup",{
              method:"POST",
              headers:{"Content-Type":"application/json"},
              body:JSON.stringify({address:d.address}),
            });
            const data=await res.json();
            if(data.ok){
              setAttomResult(data);
              // Populate fields from ATTOM — only overwrite if value is missing or zero
              setD(prev=>{
                const next={...prev};
                // Property details
                if(data.property){
                  if(data.property.beds&&!prev.beds) next.beds=String(data.property.beds);
                  if(data.property.baths&&!prev.baths) next.baths=String(data.property.baths);
                  if(data.property.sqft&&!prev.sqft) next.sqft=data.property.sqft;
                  if(data.property.yearBuilt&&!prev.yearBuilt) next.yearBuilt=String(data.property.yearBuilt);
                  if(data.property.zip&&!prev.zip) next.zip=data.property.zip;
                }
                // AVM → AS-IS value (not ARV — ARV is post-rehab, AVM is current)
                if(data.avm?.asIsValue&&!prev.asisValue) next.asisValue=data.avm.asIsValue;
                // Tax → property taxes (annual/2 for 6-month hold basis)
                if(data.tax?.annualTax&&!prev.propertyTaxes) next.propertyTaxes=Math.round(data.tax.annualTax/2);
                // Comps — only replace if no comps exist yet
                if(data.comps?.length>0&&(!prev.comps||prev.comps.length===0)) next.comps=data.comps;
                return next;
              });
            }
          }catch(e){
            setAttomResult({ok:false,error:e.message});
          }
          setAttomLoading(false);
        },1200);
        return ()=>clearTimeout(timer);
      },[d.address, attomConfigured]);

      const saveToHistory=async()=>{
        const snapshot={
          // deal inputs
          deal:{...d},
          // top-level fields for DB columns + display
          address:d.address||"Unnamed",
          verdict:r.verdict,
          arv:d.arv,
          purchasePrice:d.purchasePrice,
          rehabCost:d.rehabCost,
          netProfit:r.netProfit,
          profitPct:r.profitPct,
          profitPerSqft:r.profitPerSqft,
          bindingMaxPP:r.bindingMaxPP,
          beds:d.beds,
          baths:d.baths,
          sqft:d.sqft,
          neighborhood:d.neighborhood,
          holdMonths:d.holdMonths,
          comps:d.comps,
          pasteText:pasteText,
          arvSource:arvSource,
        };
        try{
          const res=await fetch("/api/history/save",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({snapshot}),
          });
          const data=await res.json();
          if(data.ok){
            setSaved(true);
            setTimeout(()=>setSaved(false),3000);
            fetchHistory(); // refresh list
          } else {
            alert("Save failed: "+data.error);
          }
        }catch(e){
          alert("Save failed: "+e.message);
        }
      };

      const deleteFromHistory=async(id)=>{

          const clean=rawText.replace(/```(?:json)?/gi,"").trim();

              const attomData=await attomRes.json();
              if(attomData.ok){
                setAttomResult(attomData);
                setD(prev=>{
                  const next={...prev};
                  if(attomData.property){
                    if(attomData.property.beds) next.beds=String(attomData.property.beds);
                    if(attomData.property.baths) next.baths=String(attomData.property.baths);
                    if(attomData.property.sqft) next.sqft=attomData.property.sqft;
                    if(attomData.property.yearBuilt) next.yearBuilt=String(attomData.property.yearBuilt);

                  if(attomData.tax?.annualTax) next.propertyTaxes=Math.round(attomData.tax.annualTax/2);
                  if(attomData.comps?.length>0){
                    next.comps=attomData.comps;
                    // Compute ARV directly here — sqft and comps are both in `next` now
                    if(arvSourceRef.current!=="manual"){

                        let flt=withPsf;
                        if(withPsf.length>=4){const s=[...withPsf].sort((a,b)=>a.psf-b.psf);const q1=s[Math.floor(s.length*0.25)].psf;const q3=s[Math.floor(s.length*0.75)].psf;const iqr=q3-q1;const f=withPsf.filter(c=>c.psf>=q1-1.5*iqr&&c.psf<=q3+1.5*iqr);if(f.length>=2)flt=f;}

                        const pred=Math.round(avg*sqft);
                        if(pred>0){ next.arv=pred; arvSourceRef.current="comps"; }
                      }
                    }
                  }
                  return next;

${subjectDesc}

${compsDesc}

For each comp, apply dollar adjustments for differences vs the subject in:

Return ONLY a raw JSON object — no markdown, no backticks, no explanation outside the JSON:
{

      "ageAdj": 0,

Rules:

- adjustedValue = salePrice + totalAdj`;

        let raw="";

                    )}

                    {!historyLoading&&history.map(h=>(
                      <div key={h.id} className="bg-gray-800 rounded-xl p-4">
                        <div className="flex items-start justify-between mb-2">
                          <div>
                            <div className="font-semibold text-sm text-white">{h.address}</div>
                            <div className="text-xs text-gray-500 mt-0.5">Saved {h.savedAt}</div>
                          </div>
                          <VBadge v={h.verdict}/>
                        </div>
                        <div className="grid grid-cols-3 gap-2 mb-2 text-xs">
                          {[
                            ["ARV",fmtD(h.arv)],
                            ["Ask",fmtD(h.purchasePrice)],
                            ["Rehab",fmtD(h.rehabCost)],
                            ["Net Profit",fmtD(h.netProfit),h.netProfit>=40000?"text-green-400":"text-red-400"],
                            ["ROI",fmtPct(h.profitPct),h.profitPct>=7.5?"text-green-400":"text-red-400"],
                            ["Profit/sqft","$"+fmt(h.profitPerSqft,2),(h.profitPerSqft||0)>=25?"text-green-400":"text-red-400"],
                          ].map(([l,v,color])=>(
                            <div key={l} className="bg-gray-700 rounded-lg px-2 py-1.5">
                              <div className="text-gray-500">{l}</div>
                              <div className={`font-bold ${color||"text-white"}`}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {(h.neighborhood||h.beds||h.sqft)&&(
                          <div className="text-xs text-gray-500 mb-2">
                            {[h.neighborhood,h.beds&&`${h.beds}bd/${h.baths}ba`,h.sqft&&`${Number(h.sqft).toLocaleString()} sqft`,h.holdMonths&&`${h.holdMonths}mo hold`,h.compsCount>0&&`${h.compsCount} comps`].filter(Boolean).join(" · ")}
                          </div>
                        )}
                        {h.bindingMaxPP>0&&(
                          <div className="text-xs mb-2">
                            <span className="text-gray-500">{h.bindingMaxPP<h.purchasePrice?"Suggested Counter:":"Max Offer:"} </span>
                            <span className={`font-bold ${h.bindingMaxPP<h.purchasePrice?"text-orange-400":"text-green-400"}`}>{fmtD(h.bindingMaxPP)}</span>
                          </div>
                        )}
                        <div className="flex gap-2 mt-1">
                          <button onClick={()=>loadFromHistory(h)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded-lg text-xs font-medium">📂 Load Deal</button>
                          <button onClick={()=>deleteFromHistory(h.id)} className="bg-gray-700 hover:bg-red-900 hover:text-red-300 text-gray-400 px-3 py-1 rounded-lg text-xs">🗑 Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
